<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Be[Country]">
  <!--
    Circle variant — for favicons, app icons, small contexts.
    Dark background circle so the compass reads on any surface.
  -->

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0A0A0F"/>

  <!-- Minor diagonal points (maroon) -->
  <polygon points="32,18 34,25 32,32 30,25" fill="#5C0A14" transform="rotate(45,32,32)"/>
  <polygon points="32,18 34,25 32,32 30,25" fill="#5C0A14" transform="rotate(135,32,32)"/>
  <polygon points="32,18 34,25 32,32 30,25" fill="#5C0A14" transform="rotate(225,32,32)"/>
  <polygon points="32,18 34,25 32,32 30,25" fill="#5C0A14" transform="rotate(315,32,32)"/>

  <!-- Major cardinal points (gold) -->
  <polygon points="32,6 36,20 32,32 28,20" fill="#C9A227"/>
  <polygon points="32,58 36,44 32,32 28,44" fill="#C9A227"/>
  <polygon points="58,32 44,28 32,32 44,36" fill="#C9A227"/>
  <polygon points="6,32 20,28 32,32 20,36" fill="#C9A227"/>

  <!-- Center -->
  <circle cx="32" cy="32" r="4.5" fill="#F5F0E8"/>
  <circle cx="32" cy="32" r="2" fill="#5C0A14"/>

  <!-- Subtle gold ring -->
  <circle cx="32" cy="32" r="31" stroke="#C9A227" stroke-width="1" opacity="0.3"/>
</svg>
